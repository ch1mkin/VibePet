appId: com.vibeduck.app
productName: VibeDuck
directories:
  output: release
  buildResources: build
# Ad-hoc sign the macOS app so Gatekeeper doesn't flag it as "damaged" on Apple
# Silicon (we have no paid Apple cert). See build/afterPack.cjs.
afterPack: ./build/afterPack.cjs
files:
  - out/**/*
  - package.json
asarUnpack:
  - "**/*.node"
# Ship the .env (Supabase URL + public anon key) so cloud sync works in the
# packaged app. The anon key is safe to bundle; data is protected by RLS.
extraResources:
  - from: .env
    to: .env
    filter: ["**/*"]
  # Runtime assets read by the main process (tray icons).
  - from: resources
    to: resources
    filter: ["**/*"]
  # Default sprites/animations/config so a fresh install doesn't require
  # re-uploading. Seeded into userData on first run (never overwrites user data).
  - from: seed
    to: seed
    filter: ["**/*"]
win:
  icon: build/icon.png
  target:
    - nsis
  artifactName: ${productName}-${version}-${arch}-setup.${ext}
  # Shown as the publisher in file properties / installer. NOTE: this does NOT
  # remove the SmartScreen "unknown publisher" warning — that needs a paid
  # code-signing certificate. It just fills in the author metadata.
  publisherName: VibeDuck
  legalTrademarks: VibeDuck
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
mac:
  category: public.app-category.developer-tools
  icon: build/icon.png
  # Skip code-signing for local/personal builds (no Apple Developer cert needed).
  identity: null
  # Required so macOS will show the Automation ("control System Events") consent
  # prompt — Prompt Boost drives select-all/copy/paste via AppleScript, which
  # needs Automation in addition to Accessibility.
  extendInfo:
    NSAppleEventsUsageDescription: VibeDuck uses automation to read and improve the prompt in your active AI chat box.
    NSAccessibilityUsageDescription: VibeDuck uses accessibility to read and improve the prompt in your active AI chat box.
  target:
    - dmg
  artifactName: ${productName}-${version}-${arch}.${ext}
